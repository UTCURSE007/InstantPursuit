<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Careers — Instant Pursuit</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('ip-theme')||'dark')</script>
<script src="data.js"></script>
<script src="share.js"></script>
</head>
<body>
<script src="bg.js"></script>
<script src="side-graphics.js"></script>

<main style="padding-top:64px">
<section class="ip-section" style="max-width:1080px">
  <div id="explorer"></div>
</section>
</main>

<style>
/* ── Explore root — journey timeline ── */
.journey-hero{text-align:center;margin-bottom:2.5rem;animation:fadeUp .5s ease both}
.journey-hero .ip-eyebrow{margin-bottom:14px}
.journey-hero h1{
  font-family:var(--font-display);font-weight:700;
  font-size:clamp(2rem,4.5vw,2.8rem);
  letter-spacing:-.5px;line-height:1.15;margin-bottom:10px;
}
.journey-hero p{
  color:var(--text2);font-size:1.02rem;max-width:560px;
  margin:0 auto;line-height:1.65;
}

.journey-track{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:18px;
  position:relative;margin-bottom:2.5rem;
}
.journey-cue{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:var(--font-mono);
  font-size:.8rem;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:1.4rem;
  animation:fadeUp .5s ease both, cueBob 1.6s ease-in-out infinite;
}
.journey-cue span{
  background:var(--accent-soft);
  border:1px solid var(--accent-med);
  padding:6px 14px;border-radius:20px;
  letter-spacing:1.2px;
}
@keyframes cueBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(4px)}
}
.journey-track::before{
  content:"";position:absolute;
  top:80px;left:8%;right:8%;height:3px;
  background:linear-gradient(90deg,
    rgba(108,92,231,0.2) 0%,
    var(--accent) 30%,
    var(--accent3) 70%,
    rgba(129,236,236,0.5) 100%);
  border-radius:2px;
  z-index:0;
  opacity:.55;
}
.journey-station{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;cursor:pointer;
  animation:fadeUp .5s ease both;
}
.journey-icon{
  width:80px;height:80px;border-radius:50%;
  background:var(--surface);
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;line-height:1;
  margin-bottom:14px;
  transition:transform .25s,border-color .25s,box-shadow .25s,background .25s;
  position:relative;
  box-shadow:0 4px 18px rgba(0,0,0,0.35);
}
.journey-icon::before{
  content:"";position:absolute;inset:-6px;border-radius:50%;
  background:radial-gradient(circle,rgba(108,92,231,0.3),transparent 70%);
  filter:blur(8px);z-index:-1;opacity:0;transition:opacity .25s;
}
.journey-station:hover .journey-icon{
  transform:translateY(-6px) scale(1.08);
  border-color:var(--accent);
  background:var(--card-hover);
}
.journey-station:hover .journey-icon::before{opacity:1}
.journey-age{
  font-family:var(--font-mono);
  font-size:.66rem;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;
  color:var(--accent2);
  background:var(--accent-soft);
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--accent-med);
  margin-bottom:10px;
  display:inline-block;
}
.journey-label{
  font-family:var(--font-display);
  font-weight:700;font-size:1.1rem;
  color:var(--text);line-height:1.25;
  margin-bottom:6px;letter-spacing:-.2px;
}
.journey-desc{
  color:var(--text2);font-size:.82rem;
  line-height:1.5;
  max-width:200px;margin-bottom:10px;
}
.journey-count{
  font-family:var(--font-mono);font-size:.7rem;font-weight:700;
  letter-spacing:.5px;color:var(--text3);
  display:flex;align-items:center;gap:5px;
}
.journey-count strong{
  color:var(--accent2);font-weight:700;
}
.journey-station:hover .journey-count strong{color:var(--accent3)}

/* Quick-stats strip below the timeline */
.journey-stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;
  padding:1.4rem 1.6rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  margin-bottom:2rem;
}
.journey-stat{text-align:center}
.journey-stat-num{
  font-family:var(--font-display);font-weight:800;
  font-size:1.5rem;
  color:var(--accent);
  background:var(--grad-brand);
  -webkit-background-clip:text;background-clip:text;
  line-height:1;
}
@supports ((-webkit-background-clip:text) or (background-clip:text)){
  .journey-stat-num{ -webkit-text-fill-color:transparent; color:transparent; }
}
.journey-stat-label{
  font-family:var(--font-mono);font-size:.65rem;
  color:var(--text3);letter-spacing:.8px;text-transform:uppercase;
  margin-top:4px;
}

@media(max-width:780px){
  .journey-track{grid-template-columns:1fr;gap:14px}
  .journey-track::before{
    top:8%;bottom:8%;left:40px;right:auto;
    width:3px;height:auto;
    background:linear-gradient(180deg,
      rgba(108,92,231,0.2) 0%,
      var(--accent) 30%,
      var(--accent3) 70%,
      rgba(129,236,236,0.5) 100%);
  }
  .journey-station{flex-direction:row;text-align:left;gap:18px;align-items:flex-start}
  .journey-icon{width:64px;height:64px;font-size:1.8rem;flex-shrink:0;margin-bottom:0}
  .journey-desc{max-width:none;margin-bottom:6px}
  .journey-stats{grid-template-columns:repeat(2,1fr)}
}
</style>

<script>
var careerData = loadData('instantpursuit-career', DEFAULT_CAREER_DATA);
var path = [];

function getNode(p) {
  var node = careerData;
  for (var i = 0; i < p.length; i++) {
    var k = p[i];
    if (node.children && node.children[k]) node = node.children[k];
    else if (node[k]) node = node[k];
    else return null;
  }
  return node;
}

function navTo(idx) {
  path = path.slice(0, idx);
  syncHash();
  render();
}

function navPush(key) {
  path.push(key);
  syncHash();
  render();
}

function navBack() {
  path.pop();
  syncHash();
  render();
}

function ytVideoId(url) {
  try {
    var u = new URL(url);
    if (u.hostname.indexOf('youtu.be') >= 0) return u.pathname.slice(1).split('/')[0];
    if (u.hostname.indexOf('youtube.com') >= 0 || u.hostname.indexOf('youtube-nocookie.com') >= 0) {
      if (u.pathname === '/watch') return u.searchParams.get('v');
      var parts = u.pathname.split('/').filter(Boolean);
      if (parts[0] === 'embed' || parts[0] === 'shorts' || parts[0] === 'v') return parts[1];
    }
    return null;
  } catch (e) { return null; }
}

function linkMeta(url) {
  try {
    var u = new URL(url);
    var host = u.hostname.replace('www.','');
    var isYT = host.indexOf('youtube.com') >= 0 || host.indexOf('youtu.be') >= 0 || host.indexOf('youtube-nocookie.com') >= 0;
    var vid = isYT ? ytVideoId(url) : null;
    return {
      icon: isYT ? '▶' : '🔗',
      css: isYT ? 'further-link-yt' : 'further-link-web',
      domain: host,
      isYT: isYT,
      videoId: vid,
      thumb: vid ? ('https://img.youtube.com/vi/' + vid + '/mqdefault.jpg') : null
    };
  } catch(e) {
    return { icon: '🔗', css: 'further-link-web', domain: '', isYT: false, videoId: null, thumb: null };
  }
}

function render() {
  var el = document.getElementById('explorer');
  var node = path.length === 0 ? careerData : getNode(path);
  if (!node) { path.pop(); render(); return; }

  var h = '';

  // ── Breadcrumb ──
  h += '<div class="career-breadcrumb">';
  h += '<button onclick="navTo(0)">🏠 Home</button>';
  for (var i = 0; i < path.length; i++) {
    var bn = getNode(path.slice(0, i + 1));
    var bl = bn ? (bn.label || path[i]) : path[i];
    h += '<span class="sep">›</span>';
    if (i < path.length - 1) {
      h += '<button onclick="navTo(' + (i + 1) + ')">' + bl + '</button>';
    } else {
      h += '<button style="color:var(--text);font-weight:600;cursor:default">' + bl + '</button>';
    }
  }
  h += '</div>';

  // ── Title ──
  if (path.length === 0) {
    // Root — journey timeline hero
    h += '<div class="journey-hero">';
    h += '<div class="ip-eyebrow">✦ YOUR CAREER QUEST</div>';
    h += '<h1>Where are you on the <span class="ip-grad-text">journey?</span></h1>';
    h += '<p>Pick your current stage. Every path branches into the next — explore where you stand and where you could go.</p>';
    h += '</div>';
  } else {
    h += '<h1 class="ip-section-title">' + (node.icon || '') + ' ' + node.label + '</h1>';
    if (node.description) h += '<p class="ip-section-sub">' + node.description + '</p>';
  }

  // ── Info panel ──
  var info = node.info;
  if (info) {
    h += '<div class="career-detail-box career-node">';

    if (info.detail) {
      h += '<p class="career-detail-para">' + info.detail + '</p>';
    }

    // State / council badge (for state-level exams)
    if (info.state || info.council) {
      h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
      if (info.state) h += '<span class="ip-badge ip-badge-purple" style="font-size:.7rem">📍 ' + info.state + '</span>';
      if (info.council) h += '<span class="ip-badge ip-badge-accent" style="font-size:.7rem">🏛️ ' + info.council + '</span>';
      h += '</div>';
    }

    if (info.tip) {
      h += '<div style="background:var(--cyan-soft);border:1px solid rgba(129,236,236,0.3);border-left:3px solid var(--cyan);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:0.9rem">';
      h += '<strong style="color:var(--cyan);font-family:var(--font-mono);font-size:.72rem;letter-spacing:1px;text-transform:uppercase">💡 Pro Tip</strong><br><span style="color:var(--text2)">' + info.tip + '</span></div>';
    }

    // Benefits & Drawbacks
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
    if (info.benefits && info.benefits.length) {
      h += '<div><h4 style="font-family:var(--font-mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:8px">✅ Benefits</h4>';
      for (var bi = 0; bi < info.benefits.length; bi++) h += '<div style="font-size:0.88rem;color:var(--text2);padding:3px 0">› ' + info.benefits[bi] + '</div>';
      h += '</div>';
    }
    if (info.drawbacks && info.drawbacks.length) {
      h += '<div><h4 style="font-family:var(--font-mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:8px">⚠️ Drawbacks</h4>';
      for (var di = 0; di < info.drawbacks.length; di++) h += '<div style="font-size:0.88rem;color:var(--text2);padding:3px 0">› ' + info.drawbacks[di] + '</div>';
      h += '</div>';
    }
    h += '</div>';

    // Meta cards
    if (info.topColleges || info.topRecruiters || info.avgCTC) {
      h += '<div class="career-meta-grid">';
      if (info.topColleges) {
        h += '<div class="career-meta-card"><h4>🏫 Top Colleges</h4><ul>';
        for (var ci = 0; ci < info.topColleges.length; ci++) h += '<li>' + info.topColleges[ci] + '</li>';
        h += '</ul></div>';
      }
      if (info.topRecruiters) {
        h += '<div class="career-meta-card"><h4>🏢 Top Recruiters</h4><ul>';
        for (var ri = 0; ri < info.topRecruiters.length; ri++) h += '<li>' + info.topRecruiters[ri] + '</li>';
        h += '</ul></div>';
      }
      if (info.avgCTC) {
        h += '<div class="career-meta-card"><h4>💰 Average CTC</h4><div class="grad-brand-text" style="font-size:1.15rem;font-weight:700;margin-top:4px;font-family:var(--font-display)">' + info.avgCTC + '</div></div>';
      }
      h += '</div>';
    }

    // ── Further Viewing ──
    if (info.furtherLinks && info.furtherLinks.length) {
      h += '<div class="further-links"><h4>📺 Further Viewing</h4>';
      for (var fi = 0; fi < info.furtherLinks.length; fi++) {
        var fl = info.furtherLinks[fi];
        var fm = linkMeta(fl.url);
        if (fm.thumb) {
          // YouTube with thumbnail — wider card
          h += '<a href="' + fl.url + '" target="_blank" rel="noopener" class="further-link further-link-thumb">';
          h += '<div class="further-link-yt-thumb"><img src="' + fm.thumb + '" alt="" loading="lazy"><span class="yt-play">▶</span></div>';
          h += '<div style="flex:1;min-width:0">';
          h += '<div class="further-link-title">' + (fl.title || fl.url) + '</div>';
          h += '<div class="further-link-domain">' + fm.domain + '</div></div>';
          h += '<span style="color:var(--text3);font-size:.75rem">↗</span></a>';
        } else {
          h += '<a href="' + fl.url + '" target="_blank" rel="noopener" class="further-link">';
          h += '<div class="further-link-icon ' + fm.css + '">' + fm.icon + '</div>';
          h += '<div style="flex:1;min-width:0"><div class="further-link-title">' + (fl.title || fl.url) + '</div>';
          h += '<div class="further-link-domain">' + fm.domain + '</div></div>';
          h += '<span style="color:var(--text3);font-size:.75rem">↗</span></a>';
        }
      }
      h += '</div>';
    }

    // ── Share bar ──
    var shareUrl = 'https://instantpursuit.in/explore.html#' + path.join('/');
    h += shareBar(node.label || 'Career Path', shareUrl);

    h += '</div>';
  }

  // ── Children ──
  var children = node.children || (path.length === 0 ? node : {});
  var keys = Object.keys(children);

  if (keys.length > 0 && path.length > 0) {
    // Tree layout with connectors (real divs, not pseudo-elements)
    h += '<h3 style="font-family:var(--font-display);font-weight:600;margin:1.5rem 0 0;font-size:1.1rem">Explore further</h3>';
    h += '<div class="tree-children-wrap">';
    h += '<div class="tree-vline"></div>';
    for (var ki = 0; ki < keys.length; ki++) {
      var k = keys[ki];
      var child = children[k];
      var hasKids = child.children && Object.keys(child.children).length > 0;
      var cc = hasKids ? Object.keys(child.children).length : 0;
      h += '<div class="tree-child-item career-node" style="animation-delay:' + (ki * 0.06) + 's">';
      h += '<div class="tree-child-hline"></div>';
      h += '<div class="tree-child-dot"></div>';
      h += '<div class="ip-card" onclick="navPush(\'' + k + '\')">';
      h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
      h += '<span style="font-size:1.4rem">' + (child.icon || '📁') + '</span>';
      h += '<span style="font-family:var(--font-display);font-weight:600;font-size:1.02rem">' + child.label + '</span>';
      h += '</div>';
      if (child.info && child.info.tip) {
        h += '<p style="color:var(--text2);font-size:0.84rem;line-height:1.5;margin-bottom:8px">' + child.info.tip + '</p>';
      }
      h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
      if (child.info && child.info.avgCTC) h += '<span class="ip-badge ip-badge-green">💰 ' + child.info.avgCTC + '</span>';
      if (hasKids) h += '<span class="ip-badge ip-badge-accent">' + cc + ' paths →</span>';
      else h += '<span class="ip-badge ip-badge-purple">🔍 Details</span>';
      h += '</div></div></div>';
    }
    h += '</div>';

  } else if (keys.length > 0 && path.length === 0) {
    // Root level — journey timeline visualization
    var stageMeta = {
      '6-10':       { age: 'Ages 10–17', short: 'Foundation + stream choice through school' },
      'graduation': { age: 'Ages 17–22', short: 'College, degree, first internships' },
      'post-grad':  { age: 'Ages 22–25', short: 'Masters, PhD, professional specialization' },
      'working':    { age: 'Ages 25+',   short: 'Career growth, switches, side income' }
    };

    function countLeaves(n){
      if (!n.children) return 1;
      var ks = Object.keys(n.children);
      if (ks.length === 0) return 1;
      var total = 0;
      for (var i = 0; i < ks.length; i++) total += countLeaves(n.children[ks[i]]);
      return total;
    }

    var totalPaths = 0;
    h += '<div class="journey-cue">👇 <span>Tap a stage to start</span></div>';
    h += '<div class="journey-track">';
    for (var ri2 = 0; ri2 < keys.length; ri2++) {
      var rk = keys[ri2];
      var rc = children[rk];
      var meta = stageMeta[rk] || { age: '', short: rc.description || '' };
      var leaves = countLeaves(rc);
      totalPaths += leaves;
      var subBranches = rc.children ? Object.keys(rc.children).length : 0;
      h += '<div class="journey-station" onclick="navPush(\'' + rk + '\')" style="animation-delay:' + (ri2 * 0.10) + 's">';
      h += '<div class="journey-icon">' + (rc.icon || '📁') + '</div>';
      h += '<div class="journey-age">' + meta.age + '</div>';
      h += '<div class="journey-label">' + rc.label + '</div>';
      h += '<div class="journey-desc">' + meta.short + '</div>';
      h += '<div class="journey-count">→ <strong>' + leaves + '</strong> paths inside</div>';
      h += '</div>';
    }
    h += '</div>';

    // Quick stats strip
    h += '<div class="journey-stats">';
    h += '<div class="journey-stat"><div class="journey-stat-num">' + totalPaths + '+</div><div class="journey-stat-label">Total Paths</div></div>';
    h += '<div class="journey-stat"><div class="journey-stat-num">' + keys.length + '</div><div class="journey-stat-label">Life Stages</div></div>';
    h += '<div class="journey-stat"><div class="journey-stat-num">100+</div><div class="journey-stat-label">Colleges</div></div>';
    h += '<div class="journey-stat"><div class="journey-stat-num">₹0</div><div class="journey-stat-label">Cost to You</div></div>';
    h += '</div>';

  } else if (path.length > 0) {
    h += '<div style="text-align:center;padding:2rem;color:var(--text3)">';
    h += '<div style="font-size:2rem;margin-bottom:8px">🏁</div>';
    h += '<p>This is a leaf career node. More sub-paths will be added soon!</p>';
    h += '<button onclick="navBack()" class="ip-btn ip-btn-outline" style="margin-top:16px">← Go Back</button></div>';
  }

  el.innerHTML = h;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function syncHash() {
  if (path.length > 0) {
    window.location.hash = path.join('/');
  } else {
    history.replaceState(null, '', location.pathname);
  }
}

function loadFromHash() {
  var hash = window.location.hash.replace('#', '');
  if (hash) {
    var parts = hash.split('/');
    // Verify the path is valid
    var test = careerData;
    var valid = [];
    for (var i = 0; i < parts.length; i++) {
      if (test.children && test.children[parts[i]]) {
        test = test.children[parts[i]];
        valid.push(parts[i]);
      } else if (test[parts[i]]) {
        test = test[parts[i]];
        valid.push(parts[i]);
      } else {
        break;
      }
    }
    if (valid.length > 0) path = valid;
  }
}

loadFromHash();
render();
</script>
<script>initPage();</script>
</body>
</html>
