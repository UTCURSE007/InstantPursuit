<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Careers — Instant Pursuit</title>
<link rel="stylesheet" href="styles.css">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('ip-theme')||'dark')</script>
<script src="data.js"></script>
</head>
<body>

<main style="padding-top:60px">
<section class="ip-section" style="max-width:960px">
  <div id="explorer"></div>
</section>
</main>

<script>
var careerData = loadData('instantpursuit-career', DEFAULT_CAREER_DATA);
var path = [];

function getNode(p) {
  var node = careerData;
  for (var i = 0; i < p.length; i++) {
    var k = p[i];
    if (node.children && node.children[k]) node = node.children[k];
    else if (node[k]) node = node[k];
    else return null;
  }
  return node;
}

function navTo(idx) {
  path = path.slice(0, idx);
  render();
}

function navPush(key) {
  path.push(key);
  render();
}

function navBack() {
  path.pop();
  render();
}

function linkMeta(url) {
  try {
    var u = new URL(url);
    var host = u.hostname.replace('www.','');
    var isYT = host.indexOf('youtube.com') >= 0 || host.indexOf('youtu.be') >= 0;
    return { icon: isYT ? '▶' : '🔗', css: isYT ? 'further-link-yt' : 'further-link-web', domain: host };
  } catch(e) {
    return { icon: '🔗', css: 'further-link-web', domain: '' };
  }
}

function render() {
  var el = document.getElementById('explorer');
  var node = path.length === 0 ? careerData : getNode(path);
  if (!node) { path.pop(); render(); return; }

  var h = '';

  // ── Breadcrumb ──
  h += '<div class="career-breadcrumb">';
  h += '<button onclick="navTo(0)">🏠 Home</button>';
  for (var i = 0; i < path.length; i++) {
    var bn = getNode(path.slice(0, i + 1));
    var bl = bn ? (bn.label || path[i]) : path[i];
    h += '<span class="sep">›</span>';
    if (i < path.length - 1) {
      h += '<button onclick="navTo(' + (i + 1) + ')">' + bl + '</button>';
    } else {
      h += '<button style="color:var(--text);font-weight:600;cursor:default">' + bl + '</button>';
    }
  }
  h += '</div>';

  // ── Title ──
  if (path.length === 0) {
    h += '<h1 class="ip-section-title">🗺️ Career Explorer</h1>';
    h += '<p class="ip-section-sub">Select your education stage to begin exploring career paths.</p>';
  } else {
    h += '<h1 class="ip-section-title">' + (node.icon || '') + ' ' + node.label + '</h1>';
    if (node.description) h += '<p class="ip-section-sub">' + node.description + '</p>';
  }

  // ── Info panel ──
  var info = node.info;
  if (info) {
    h += '<div class="career-detail-box career-node">';

    if (info.detail) {
      h += '<p class="career-detail-para">' + info.detail + '</p>';
    }

    if (info.tip) {
      h += '<div style="background:var(--accent-soft);border:1px solid var(--accent-med);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;font-size:0.9rem">';
      h += '<strong style="color:var(--accent)">💡 Pro Tip:</strong> <span style="color:var(--text2)">' + info.tip + '</span></div>';
    }

    // Benefits & Drawbacks
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
    if (info.benefits && info.benefits.length) {
      h += '<div><h4 style="font-family:var(--font-mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:8px">✅ Benefits</h4>';
      for (var bi = 0; bi < info.benefits.length; bi++) h += '<div style="font-size:0.88rem;color:var(--text2);padding:3px 0">› ' + info.benefits[bi] + '</div>';
      h += '</div>';
    }
    if (info.drawbacks && info.drawbacks.length) {
      h += '<div><h4 style="font-family:var(--font-mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--red);margin-bottom:8px">⚠️ Drawbacks</h4>';
      for (var di = 0; di < info.drawbacks.length; di++) h += '<div style="font-size:0.88rem;color:var(--text2);padding:3px 0">› ' + info.drawbacks[di] + '</div>';
      h += '</div>';
    }
    h += '</div>';

    // Meta cards
    if (info.topColleges || info.topRecruiters || info.avgCTC) {
      h += '<div class="career-meta-grid">';
      if (info.topColleges) {
        h += '<div class="career-meta-card"><h4>🏫 Top Colleges</h4><ul>';
        for (var ci = 0; ci < info.topColleges.length; ci++) h += '<li>' + info.topColleges[ci] + '</li>';
        h += '</ul></div>';
      }
      if (info.topRecruiters) {
        h += '<div class="career-meta-card"><h4>🏢 Top Recruiters</h4><ul>';
        for (var ri = 0; ri < info.topRecruiters.length; ri++) h += '<li>' + info.topRecruiters[ri] + '</li>';
        h += '</ul></div>';
      }
      if (info.avgCTC) {
        h += '<div class="career-meta-card"><h4>💰 Average CTC</h4><div style="font-size:1.1rem;font-weight:700;color:var(--accent);margin-top:4px">' + info.avgCTC + '</div></div>';
      }
      h += '</div>';
    }

    // ── Further Viewing ──
    if (info.furtherLinks && info.furtherLinks.length) {
      h += '<div class="further-links"><h4>📺 Further Viewing</h4>';
      for (var fi = 0; fi < info.furtherLinks.length; fi++) {
        var fl = info.furtherLinks[fi];
        var fm = linkMeta(fl.url);
        h += '<a href="' + fl.url + '" target="_blank" rel="noopener" class="further-link">';
        h += '<div class="further-link-icon ' + fm.css + '">' + fm.icon + '</div>';
        h += '<div style="flex:1;min-width:0"><div class="further-link-title">' + (fl.title || fl.url) + '</div>';
        h += '<div class="further-link-domain">' + fm.domain + '</div></div>';
        h += '<span style="color:var(--text3);font-size:.75rem">↗</span></a>';
      }
      h += '</div>';
    }

    h += '</div>';
  }

  // ── Children ──
  var children = node.children || (path.length === 0 ? node : {});
  var keys = Object.keys(children);

  if (keys.length > 0 && path.length > 0) {
    // Tree layout with connectors (real divs, not pseudo-elements)
    h += '<h3 style="font-family:var(--font-display);font-weight:600;margin:1.5rem 0 0;font-size:1.1rem">Explore further</h3>';
    h += '<div class="tree-header">';
    h += '<div class="tree-root-dot"></div>';
    h += '<div class="tree-trunk-line"></div>';
    h += '</div>';
    h += '<div class="tree-children-wrap">';
    h += '<div class="tree-vline"></div>';
    for (var ki = 0; ki < keys.length; ki++) {
      var k = keys[ki];
      var child = children[k];
      var hasKids = child.children && Object.keys(child.children).length > 0;
      var cc = hasKids ? Object.keys(child.children).length : 0;
      h += '<div class="tree-child-item career-node" style="animation-delay:' + (ki * 0.06) + 's">';
      h += '<div class="tree-child-hline"></div>';
      h += '<div class="tree-child-dot"></div>';
      h += '<div class="ip-card" onclick="navPush(\'' + k + '\')">';
      h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
      h += '<span style="font-size:1.4rem">' + (child.icon || '📁') + '</span>';
      h += '<span style="font-family:var(--font-display);font-weight:600;font-size:1.02rem">' + child.label + '</span>';
      h += '</div>';
      if (child.info && child.info.tip) {
        h += '<p style="color:var(--text2);font-size:0.84rem;line-height:1.5;margin-bottom:8px">' + child.info.tip + '</p>';
      }
      h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
      if (child.info && child.info.avgCTC) h += '<span class="ip-badge ip-badge-green">💰 ' + child.info.avgCTC + '</span>';
      if (hasKids) h += '<span class="ip-badge ip-badge-accent">' + cc + ' paths →</span>';
      else h += '<span class="ip-badge ip-badge-purple">🔍 Details</span>';
      h += '</div></div></div>';
    }
    h += '</div>';

  } else if (keys.length > 0 && path.length === 0) {
    // Root level — grid, no connectors
    h += '<div class="grid-2">';
    for (var ri2 = 0; ri2 < keys.length; ri2++) {
      var rk = keys[ri2];
      var rc = children[rk];
      var rHasKids = rc.children && Object.keys(rc.children).length > 0;
      var rcc = rHasKids ? Object.keys(rc.children).length : 0;
      h += '<div class="ip-card career-node" style="animation-delay:' + (ri2 * 0.05) + 's" onclick="navPush(\'' + rk + '\')">';
      h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      h += '<span style="font-size:1.5rem">' + (rc.icon || '📁') + '</span>';
      h += '<span style="font-family:var(--font-display);font-weight:600;font-size:1.05rem">' + rc.label + '</span></div>';
      if (rc.description) h += '<p style="color:var(--text2);font-size:0.85rem;line-height:1.5;margin-bottom:8px">' + rc.description + '</p>';
      h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
      if (rHasKids) h += '<span class="ip-badge ip-badge-accent">' + rcc + ' paths →</span>';
      h += '</div></div>';
    }
    h += '</div>';

  } else if (path.length > 0) {
    h += '<div style="text-align:center;padding:2rem;color:var(--text3)">';
    h += '<div style="font-size:2rem;margin-bottom:8px">🏁</div>';
    h += '<p>This is a leaf career node. More sub-paths will be added soon!</p>';
    h += '<button onclick="navBack()" class="ip-btn ip-btn-outline" style="margin-top:16px">← Go Back</button></div>';
  }

  el.innerHTML = h;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
<script>initPage();</script>
</body>
</html>
