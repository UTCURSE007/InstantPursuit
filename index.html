function useLocalData(key, defaultValue) {
  const [data, setData] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      return saved ? JSON.parse(saved) : defaultValue;
    } catch { return defaultValue; }
  });
  const save = useCallback((newData) => {
    setData(newData);
    localStorage.setItem(key, JSON.stringify(newData));
  }, [key]);
  return [data, save];
}

  // Blog form state

  // Career node form
  const [nodePath, setNodePath] = useState('');
  const [nodeKey, setNodeKey] = useState('');
  const [nodeLabel, setNodeLabel] = useState('');
  const [nodeIcon, setNodeIcon] = useState('');
  const [nodeBenefits, setNodeBenefits] = useState('');
  const [nodeDrawbacks, setNodeDrawbacks] = useState('');
  const [nodeTip, setNodeTip] = useState('');

  const showMsg = (m) => { setMsg(m); setTimeout(() => setMsg(''), 3000); };

  const addBlog = () => {
    if (!blogForm.title || !blogForm.content || !blogForm.author) { showMsg('❌ Title, content, and author are required'); return; }
    const newBlog = {
      id: Date.now(),
      ...blogForm,
      authorAvatar: blogForm.authorAvatar || blogForm.author.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(),
      date: new Date().toISOString().split('T')[0],
      tags: blogForm.tags.split(',').map(t => t.trim()).filter(Boolean),
      readTime: blogForm.readTime || `${Math.ceil(blogForm.content.split(' ').length / 200)} min`,
    };
    setBlogs([newBlog, ...blogs]);
    setBlogForm({ title: '', excerpt: '', content: '', author: '', authorLinkedin: '', authorAvatar: '', category: '', tags: '', readTime: '' });
    showMsg('✅ Blog post added successfully!');
  };

  const addCareerNode = () => {
    if (!nodeKey || !nodeLabel) { showMsg('❌ Key and label are required'); return; }
    const newData = JSON.parse(JSON.stringify(careerData));
    const pathParts = nodePath.split('.').filter(Boolean);
    let current = newData;
    for (const part of pathParts) {
      if (current[part]) current = current[part].children || current[part];
      else { showMsg('❌ Invalid path: ' + part + ' not found'); return; }
    }
    current[nodeKey] = {
      label: nodeLabel,
      icon: nodeIcon || '📌',
      info: {
        benefits: nodeBenefits.split('\n').filter(Boolean),
        drawbacks: nodeDrawbacks.split('\n').filter(Boolean),
        tip: nodeTip || 'Explore this career path!'
      },
      children: {}
    };
    setCareerData(newData);
    setNodeKey(''); setNodeLabel(''); setNodeIcon(''); setNodeBenefits(''); setNodeDrawbacks(''); setNodeTip(''); setNodePath('');
    showMsg('✅ Career node added!');
  };

  const deleteBlog = (id) => {
    setBlogs(blogs.filter(b => b.id !== id));
    showMsg('🗑️ Blog deleted');

  const exportData = () => {
    const data = JSON.stringify({ careerData, blogs }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'pathforge-data.json'; a.click();

    showMsg('📥 Data exported!');

        if (d.careerData) setCareerData(d.careerData);
        if (d.blogs) setBlogs(d.blogs);

function renderTreeKeys(obj, depth = 0) {
  let result = '';
  for (const [key, val] of Object.entries(obj)) {
    const indent = '  '.repeat(depth);
    result += `${indent}${val.icon || '·'} ${key}: "${val.label || key}"\n`;
    if (val.children && Object.keys(val.children).length > 0) {
      result += renderTreeKeys(val.children, depth + 1);
    }
  }
  return result;
}

function App() {
  const [page, setPage] = useState('home');
  const [careerData, setCareerData] = useLocalData('pathforge-career', DEFAULT_CAREER_DATA);
  const [blogs, setBlogs] = useLocalData('pathforge-blogs', DEFAULT_BLOG_DATA);

  useEffect(() => { window.scrollTo(0, 0); }, [page]);

  let content;
  switch (page) {
    case 'explorer': content = React.createElement(CareerExplorer, { careerData }); break;
    case 'blog': content = React.createElement(BlogPage, { blogs }); break;
    case 'admin': content = React.createElement(AdminPanel, { careerData, setCareerData, blogs, setBlogs }); break;
    default: content = React.createElement(HomePage, { setPage });
  }

  return React.createElement(React.Fragment, null,
    React.createElement(Navbar, { page, setPage }),
    content
  );
}
