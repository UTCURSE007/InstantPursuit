<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Instant Pursuit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('ip-theme')||'dark')</script>
<script src="data.js"></script>
<script src="share.js"></script>
</head>
<body>
<script src="bg.js"></script>

<main style="padding-top:64px">
<section class="ip-section" style="max-width:860px">
  <div id="blog-root"></div>
</section>
</main>

<script>
const blogs = loadData('instantpursuit-blogs', DEFAULT_BLOG_DATA);
let selectedBlog = null;
let filterCat = 'All';

function blogLinkMeta(url) {
  try {
    var u = new URL(url);
    var host = u.hostname.replace('www.','');
    var isYT = host.indexOf('youtube.com') >= 0 || host.indexOf('youtu.be') >= 0;
    return { icon: isYT ? '▶' : '🔗', css: isYT ? 'further-link-yt' : 'further-link-web', domain: host };
  } catch(e) {
    return { icon: '🔗', css: 'further-link-web', domain: '' };
  }
}

function renderFurtherReads(reads) {
  if (!reads || !reads.length) return '';
  var html = '<div class="further-links" style="margin-top:2rem"><h4>📚 Continue Reading</h4>';
  for (var i = 0; i < reads.length; i++) {
    var r = reads[i];
    var m = blogLinkMeta(r.url);
    html += '<a href="' + r.url + '" target="_blank" rel="noopener" class="further-link">';
    html += '<div class="further-link-icon ' + m.css + '">' + m.icon + '</div>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div class="further-link-title">' + (r.title || r.url) + '</div>';
    html += '<div class="further-link-domain">' + m.domain + '</div>';
    html += '</div>';
    html += '<span style="color:var(--text3);font-size:.75rem">↗</span></a>';
  }
  html += '</div>';
  return html;
}

function renderBlog() {
  const el = document.getElementById('blog-root');
  const cats = ['All', ...new Set(blogs.map(b => b.category))];

  if (selectedBlog) {
    const b = selectedBlog;
    const blogUrl = 'https://instantpursuit.in/blog.html#post-' + b.id;
    let coverHtml = '';
    if (b.coverImage) {
      coverHtml = '<img src="' + b.coverImage + '" alt="' + b.title + '" class="blog-cover" style="border-radius:var(--radius-lg);margin-bottom:24px;width:100%;max-height:360px;object-fit:cover">';
    }
    el.innerHTML = `
      <button onclick="selectedBlog=null;history.replaceState(null,'',location.pathname);renderBlog()" class="ip-btn ip-btn-outline" style="margin-bottom:1.5rem;font-size:0.85rem">← Back to all posts</button>
      <article style="animation:fadeUp 0.4s ease">
        ${coverHtml}
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
          <span class="ip-badge ip-badge-accent">${b.category}</span>
          <span class="ip-badge ip-badge-purple">${b.readTime}</span>
        </div>
        <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(1.6rem,4vw,2.2rem);line-height:1.3;margin-bottom:16px">${b.title}</h1>
        <div style="display:flex;align-items:center;gap:12px;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:24px">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:0.85rem">${b.authorAvatar}</div>
          <div>
            <div style="font-weight:600;font-size:0.9rem">${b.author}</div>
            <div style="color:var(--text3);font-size:0.8rem">${new Date(b.date).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})}</div>
          </div>
        </div>
        <div style="font-size:1.05rem;line-height:1.85;color:var(--text2)">
          ${b.content.split('\n\n').map(p => `<p style="margin-bottom:1.2rem">${p}</p>`).join('')}
        </div>
        <div style="margin-top:2rem;display:flex;gap:8px;flex-wrap:wrap">
          ${b.tags.map(t => `<span class="ip-badge ip-badge-accent">${t}</span>`).join('')}
        </div>
        ${renderFurtherReads(b.furtherReads)}
        ${shareBar(b.title, blogUrl)}
      </article>
    `;
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }

  let html = `
    <h1 class="ip-section-title">✍️ Career Stories & Guides</h1>
    <p class="ip-section-sub">Real insights from students and professionals who've walked these paths.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2rem">
      ${cats.map(c => `<button onclick="filterCat='${c}';renderBlog()" class="ip-btn ${filterCat===c?'ip-btn-primary':'ip-btn-outline'}" style="padding:6px 16px;font-size:0.82rem">${c}</button>`).join('')}
    </div>
    <div style="display:grid;gap:1.25rem">
  `;

  const filtered = filterCat === 'All' ? blogs : blogs.filter(b => b.category === filterCat);
  filtered.forEach((b, i) => {
    html += `
      <div class="blog-card" style="cursor:pointer;animation:fadeUp 0.4s ease ${i*0.06}s both" onclick="selectedBlog=blogs.find(x=>x.id===${b.id});window.location.hash='post-'+${b.id};renderBlog()">
        ${b.coverImage ? '<img src="' + b.coverImage + '" alt="" class="blog-cover">' : ''}
        <div class="blog-card-body">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <span class="ip-badge ip-badge-accent">${b.category}</span>
            <span class="ip-badge ip-badge-purple">${b.readTime}</span>
          </div>
          <div class="blog-card-title">${b.title}</div>
          <div class="blog-card-excerpt">${b.excerpt}</div>
          <div class="blog-card-meta">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);font-size:0.7rem">${b.authorAvatar}</div>
            <span>${b.author}</span>
            <span>·</span>
            <span>${new Date(b.date).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'})}</span>
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';

  if (filtered.length === 0) {
    html += `<div style="text-align:center;padding:3rem;color:var(--text3)"><p>No posts in this category yet.</p></div>`;
  }

  el.innerHTML = html;
}

// Deep link: check URL hash for #post-ID
function checkBlogHash() {
  var hash = window.location.hash;
  if (hash && hash.indexOf('#post-') === 0) {
    var postId = parseInt(hash.replace('#post-', ''));
    if (postId) {
      var found = blogs.find(function(b) { return b.id === postId; });
      if (found) {
        selectedBlog = found;
      }
    }
  }
}

checkBlogHash();
renderBlog();

// Also listen for hash changes (back/forward)
window.addEventListener('hashchange', function() {
  checkBlogHash();
  renderBlog();
});
</script>
<script>initPage();</script>
</body>
</html>
