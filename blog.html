<style>
/* ── Blog index — editorial layout ── */
.blog-hero{text-align:center;margin-bottom:2.5rem;animation:fadeUp .5s ease both}
.blog-hero .ip-eyebrow{margin-bottom:14px}
.blog-hero h1{
  font-family:var(--font-display);font-weight:700;

/* Category filter strip */

}

<script>
function renderBlogContent(content, images) {
  if (!content) return '';
  function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  // Normalize: collapse whitespace-only "blank" lines to true `\n\n` so
  // ## headings + their bodies split cleanly even if the source has stray spaces.
  var normalized = content
    .replace(/\r\n/g, '\n')
    .replace(/[ \t]+\n/g, '\n')      // trailing whitespace on a line → strip
    .replace(/\n[ \t]+\n/g, '\n\n'); // whitespace-only line → real blank line
  return normalized.split('\n\n').map(p => {
    var trimmed = p.trim();
    if (!trimmed) return '';
    // ── Subheadings (markdown-style) ──
    if (/^###\s+/.test(trimmed)) return '<h3 class="article-h3">' + escHtml(trimmed.replace(/^###\s+/, '')) + '</h3>';
    if (/^##\s+/.test(trimmed))  return '<h2 class="article-h2">' + escHtml(trimmed.replace(/^##\s+/, ''))  + '</h2>';
    // ── Inline image markers ──
    var m = trimmed.match(/^\[image:(\d+)\]$/);
    if (m && images && Array.isArray(images)) {
      var idx = parseInt(m[1], 10) - 1;
      var img = images[idx];
      if (img && img.data) {
        var pos = img.position || 'center';
        var cap = img.caption ? '<figcaption>' + escHtml(img.caption) + '</figcaption>' : '';
        return '<figure class="blog-inline-img blog-inline-img-' + pos + '"><img src="' + img.data + '" alt="' + escHtml(img.caption || '').replace(/"/g, '&quot;') + '" loading="lazy">' + cap + '</figure>';
      }
    }
    return '<p>' + p + '</p>';
  }).join('');
}

const blogs = loadData('instantpursuit-blogs', DEFAULT_BLOG_DATA);
let selectedBlog = null;
let filterCat = 'All';

function ytVideoId(url) {
  try {
    var u = new URL(url);
    if (u.hostname.indexOf('youtu.be') >= 0) return u.pathname.slice(1).split('/')[0];
    if (u.hostname.indexOf('youtube.com') >= 0 || u.hostname.indexOf('youtube-nocookie.com') >= 0) {
      if (u.pathname === '/watch') return u.searchParams.get('v');
      var parts = u.pathname.split('/').filter(Boolean);
      if (parts[0] === 'embed' || parts[0] === 'shorts' || parts[0] === 'v') return parts[1];
    }
    return null;
  } catch (e) { return null; }
}

function blogLinkMeta(url) {
  try {
    var u = new URL(url);
    var host = u.hostname.replace('www.','');
    var isYT = host.indexOf('youtube.com') >= 0 || host.indexOf('youtu.be') >= 0 || host.indexOf('youtube-nocookie.com') >= 0;
    var vid = isYT ? ytVideoId(url) : null;
    return {
      icon: isYT ? '▶' : '🔗',
      css: isYT ? 'further-link-yt' : 'further-link-web',
      domain: host,
      isYT: isYT,
      thumb: vid ? ('https://img.youtube.com/vi/' + vid + '/mqdefault.jpg') : null
    };
  } catch(e) {
    return { icon: '🔗', css: 'further-link-web', domain: '', isYT: false, thumb: null };
  }
}

function renderFurtherReads(reads) {
  if (!reads || !reads.length) return '';
  var html = '<div class="further-links" style="max-width:680px;margin:2.5rem auto 0"><h4>📚 Continue Reading</h4>';
  for (var i = 0; i < reads.length; i++) {
    var r = reads[i];
    var m = blogLinkMeta(r.url);
    if (m.thumb) {
      html += '<a href="' + r.url + '" target="_blank" rel="noopener" class="further-link further-link-thumb">';
      html += '<div class="further-link-yt-thumb"><img src="' + m.thumb + '" alt="" loading="lazy"><span class="yt-play">▶</span></div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div class="further-link-title">' + (r.title || r.url) + '</div>';
      html += '<div class="further-link-domain">' + m.domain + '</div></div>';
      html += '<span style="color:var(--text3);font-size:.75rem">↗</span></a>';
    } else {
      html += '<a href="' + r.url + '" target="_blank" rel="noopener" class="further-link">';
      html += '<div class="further-link-icon ' + m.css + '">' + m.icon + '</div>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div class="further-link-title">' + (r.title || r.url) + '</div>';
      html += '<div class="further-link-domain">' + m.domain + '</div>';
      html += '</div>';
      html += '<span style="color:var(--text3);font-size:.75rem">↗</span></a>';
    }
  }
  html += '</div>';
  return html;
}

function avatarClass(i){ return 'av-' + ((i % 6) + 1); }

function renderBlog() {
  const el = document.getElementById('blog-root');

  // ── Article view ──
  if (selectedBlog) {
    const b = selectedBlog;
    const blogUrl = 'https://instantpursuit.in/blog.html#post-' + b.id;
    const avClass = avatarClass(b.id - 1);
    const dateStr = new Date(b.date).toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'});

    el.innerHTML = `
      <button class="article-back" onclick="selectedBlog=null;history.replaceState(null,'',location.pathname);renderBlog()">← All Stories</button>
      <article style="animation:fadeUp .4s ease both">
        <div class="article-hero">
          <div class="article-tags">
            <span class="ip-badge ip-badge-accent">${b.category}</span>
            <span class="ip-badge ip-badge-purple">${b.readTime}</span>
          </div>
          <h1 class="article-title">${b.title}</h1>
          <div class="article-meta">
            <div class="ma ${avClass}">${b.authorAvatar}</div>
            <div style="text-align:left">
              <div>${b.authorLink ? `<a href="${b.authorLink}" target="_blank" rel="noopener" class="author-link"><strong>${b.author}</strong></a>` : `<strong>${b.author}</strong>`}</div>
              <div>${dateStr} · ${b.readTime}</div>
            </div>
          </div>
          ${b.linkedin ? `
          <div class="article-interviewee">
            <span class="ai-eyebrow">Featuring</span>
            <a href="${b.linkedin}" target="_blank" rel="noopener" class="ai-link">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57C12.92 12.8 13.54 12.17 14.31 12.17A1.4 1.4 0 0 1 15.71 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88C8.56 5.95 7.81 5.19 6.88 5.19A1.69 1.69 0 0 0 5.19 6.88C5.19 7.81 5.95 8.56 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z"/></svg>
              <span>${b.linkedinName || 'View on LinkedIn'}</span>
              <span class="ai-arrow">↗</span>
            </a>
          </div>` : ''}
        </div>
        ${b.coverImage ? `<div class="article-cover"><img src="${b.coverImage}" alt="${b.title}"></div>` : ''}
        <div class="article-body">
          ${renderBlogContent(b.content, b.images)}
        </div>
        <div class="article-tags-wrap">
          ${b.tags.map(t => `<span class="ip-badge ip-badge-accent">#${t}</span>`).join('')}
        </div>
        ${renderFurtherReads(b.furtherReads)}
        <div style="max-width:680px;margin:0 auto">${shareBar(b.title, blogUrl)}</div>
      </article>
    `;
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }

  // ── Index view ──
  const cats = ['All', ...new Set(blogs.map(b => b.category))];
  const filtered = filterCat === 'All' ? blogs : blogs.filter(b => b.category === filterCat);

  let html = `
    <div class="blog-hero">
      <h1>Career Stories &amp; <span class="ip-grad-text">Honest Guides</span></h1>
      <p>Real journeys from students and professionals who've walked these paths. No motivational fluff — just the stuff they wish someone had told them.</p>
    </div>

    <div class="cat-filter">
      ${cats.map(c => `<button class="cat-pill ${filterCat===c?'active':''}" onclick="filterCat='${c}';renderBlog()">${c}</button>`).join('')}
    </div>
  `;

  if (filtered.length === 0) {
    html += `<div style="text-align:center;padding:3rem;color:var(--text3)"><p>No posts in this category yet.</p></div>`;
    el.innerHTML = html;
    return;
  }

  // Featured = post explicitly marked featured:true, else the first post
  const feat = filtered.find(b => b.featured) || filtered[0];
  const featAvClass = avatarClass(feat.id - 1);
  const featDateStr = new Date(feat.date).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'});
  html += `
    <div class="featured" onclick="selectedBlog=blogs.find(x=>x.id===${feat.id});window.location.hash='post-'+${feat.id};renderBlog()">
      <div class="featured-cover">
        ${feat.coverImage ? `<img src="${feat.coverImage}" alt="${feat.title}">` : '<div style="width:100%;height:100%;background:var(--grad-cta)"></div>'}
        <div class="featured-tag">Featured</div>
      </div>
      <div class="featured-body">
        <div class="featured-cat"><span class="dot"></span>${feat.category}</div>
        <div class="featured-title">${feat.title}</div>
        <div class="featured-excerpt">${feat.excerpt}</div>
        <div class="featured-byline">
          <div class="featured-avatar ${featAvClass}">${feat.authorAvatar}</div>
          <div>
            <div class="featured-author">${feat.author}</div>
            <div class="featured-meta">${featDateStr} · ${feat.readTime}</div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Rest as grid
  if (filtered.length > 1) {
    html += `<div class="section-divider"><span>More Stories</span></div>`;
    html += `<div class="posts-grid">`;
    filtered.filter(b => b.id !== feat.id).forEach((b, i) => {
      const av = avatarClass(b.id - 1);
      const dt = new Date(b.date).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'});
      html += `
        <div class="post-card" style="animation-delay:${i*0.06}s" onclick="selectedBlog=blogs.find(x=>x.id===${b.id});window.location.hash='post-'+${b.id};renderBlog()">
          ${b.coverImage ? `<div class="post-card-cover"><img src="${b.coverImage}" alt=""></div>` : ''}
          <div class="post-card-body">
            <div class="post-card-cat">${b.category} · ${b.readTime}</div>
            <div class="post-card-title">${b.title}</div>
            <div class="post-card-excerpt">${b.excerpt}</div>
            <div class="post-card-byline">
              <div class="post-card-avatar ${av}">${b.authorAvatar}</div>
              <span class="post-card-author">${b.author}</span>
              <span>·</span>
              <span>${dt}</span>
            </div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function checkBlogHash() {
  var hash = window.location.hash;
  if (hash && hash.indexOf('#post-') === 0) {
    var postId = parseInt(hash.replace('#post-', ''));
    if (postId) {
      var found = blogs.find(function(b) { return b.id === postId; });
      if (found) selectedBlog = found;
    }
  }
}

checkBlogHash();
renderBlog();

window.addEventListener('hashchange', function() {
  checkBlogHash();
  renderBlog();
});
</script>
<script>initPage();</script>
</body>
</html>
