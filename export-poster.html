<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<title>Poster export</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="posters.css" />
<style>
  html,body{margin:0;background:#0a0a0f}
  #stage{width:1080px;height:1080px;overflow:hidden}
</style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="poster-components.jsx"></script>
<script type="text/babel">
  const MAP = {
    e1: window.ExploreHero, e2: window.ExploreMap, b0: window.BlogHub,
    b1: window.BlogShlokas, b2: window.BlogGate, b3: window.BlogMurli, b4: window.BlogPavan,
  };
  const root = ReactDOM.createRoot(document.getElementById('stage'));
  window.showPoster = (key) => {
    const C = MAP[key];
    root.render(<C />);
  };
  // default
  window.showPoster((location.hash || '#e1').slice(1));
</script>
</body>
</html>
